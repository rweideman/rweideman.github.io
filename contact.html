<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Rawsen Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="nav-wrap">
      <a href="index.html" class="home-link">Home</a>
      <nav class="nav">
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <h1>Contact</h1>
  </section>

<main class="page-content contact-page-content">
  <section class="contact-layout">
    <div class="contact-message-block">
      <h2>Send Me a Message</h2>
      <p>
        Let's get in touch! If you have a question, opportunity, or project idea for me, I’d love to hear from you!
        Just leave your contact information and I’ll get back to you as soon as I can.
      </p>

      <form class="contact-form" action="https://formspree.io/f/meevwara" method="POST">
        <div class="contact-field-row">
          <div class="contact-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="contact-field">
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>

        <div class="contact-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <aside class="contact-side-links">
      <a class="contact-side-btn" href="https://linkedin.com/in/rawsen-weideman" target="_blank" rel="noreferrer">
        LinkedIn
      </a>

      <a class="contact-side-btn" href="https://github.com/rweideman" target="_blank" rel="noreferrer">
        GitHub
      </a>

      <br>
      
      <div class="resume-detail-image">
        <img src="images/contact.png" alt="Contact Image">
      </div>
    </aside>
  </section>
</main>
